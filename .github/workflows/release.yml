name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example, v0.1.0)
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_suffix: x86_64-linux
          - os: macos-latest
            archive_suffix: aarch64-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail

          archive_name="cli-tools-${{ inputs.tag }}-${{ matrix.archive_suffix }}.tar.gz"
          staging_dir="dist/cli-tools-${{ inputs.tag }}-${{ matrix.archive_suffix }}"

          mkdir -p "$staging_dir"
          install -m 755 target/release/agent_memory "$staging_dir/agent_memory"
          install -m 755 target/release/project_index "$staging_dir/project_index"
          install -m 755 target/release/session_reader "$staging_dir/session_reader"

          tar -czf "dist/$archive_name" -C dist "cli-tools-${{ inputs.tag }}-${{ matrix.archive_suffix }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: cli-tools-${{ inputs.tag }}-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-tools-${{ inputs.tag }}-*
          merge-multiple: true

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ inputs.tag }}"

          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "Tag $tag_name already exists locally"
          else
            git tag "$tag_name"
          fi

          git push origin "$tag_name"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: dist/*.tar.gz
